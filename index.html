<html lang="en">

         CI rewrites this to "/<repo>/" for GitHub Pages (see gh-pages-deploy.yml). -->
    <base href="/" />
    <meta charset="utf-8" />
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0" />
    <title>Runling</title>
    <link data-trunk rel="copy-dir" href="assets/images" />
    <link data-trunk rel="css" href="assets/style.css" />
    <link data-trunk rel="icon" href="assets/images/icon.jpg" />
</head>
<body></body>
</html>
