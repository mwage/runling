name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the GITHUB_TOKEN to deploy to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs for the same ref.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # Repo name (without owner), used for both the asset public-url and the
    # <base> rewrite so links work under username.github.io/<repo>/. Defined at
    # job scope so every step can see it — a step-level `env:` would only be
    # visible inside that one step.
    env:
      RUNLING_BASE: ${{ github.event.repository.name }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Trunk
        uses: jetli/trunk-action@v0.5.0
        with:
          version: latest

      - name: Build
        run: trunk build --release --public-url "/${RUNLING_BASE}/"

      - name: Rewrite <base> for subpath
        # Trunk prefixes its own asset links with --public-url but leaves the
        # hardcoded <base href="/"> alone; point it at the repo subpath so
        # relative image paths resolve under username.github.io/<repo>/.
        run: sed -i "s|<base href=\"/\"|<base href=\"/${RUNLING_BASE}/\"|" dist/index.html

      - name: SPA fallback
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
